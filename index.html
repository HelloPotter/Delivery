```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dragon Fort Delivery SMS</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
    color:#222;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.section{
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:5px;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#000;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.preview{
    width:100%;
    margin-top:15px;
    border-radius:12px;
}

.status{
    margin-top:10px;
    font-size:14px;
    color:#666;
}

textarea{
    min-height:220px;
}

.small{
    font-size:13px;
    color:#666;
}
</style>
</head>

<body>

<div class="container">

<h1>Dragon Fort Delivery SMS</h1>

<div class="section">
    <label>Select Order Photo</label>

    <input
        type="file"
        id="imageInput"
        accept="image/*"
        capture="environment"
    >

    <img id="preview" class="preview" style="display:none;">

    <div class="status" id="status"></div>
</div>

<div class="section">

    <label>Phone Number</label>
    <input type="text" id="phone">

    <label>Order Total</label>
    <input type="text" id="total">

    <label>Delivery Fee</label>
    <input type="text" id="delivery">

    <label>Estimated Arrival Time (minutes)</label>
    <input type="text" id="minutes" value="20">

</div>

<div class="section">

    <button onclick="generateMessage()">
        Generate Message
    </button>

    <label>Generated Message</label>

    <textarea id="message"></textarea>

    <button onclick="sendSMS()">
        Send via Messages
    </button>

</div>

<div class="small">
    OCR works best with clear and straight photos.
</div>

</div>

<script>

const imageInput = document.getElementById('imageInput');
const preview = document.getElementById('preview');
const statusText = document.getElementById('status');

imageInput.addEventListener('change', async function(e){

    const file = e.target.files[0];

    if(!file) return;

    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';

    statusText.innerText = 'Reading image...';

    try{

        const compressedImage = await compressImage(file);

        statusText.innerText = 'Running OCR...';

        const result = await Tesseract.recognize(
            compressedImage,
            'eng'
        );

        const text = result.data.text;

        console.log(text);

        parseOrder(text);

        statusText.innerText = 'OCR completed. Please verify the fields.';

    }catch(err){

        console.error(err);

        statusText.innerText = 'OCR failed. Please fill manually.';
    }

});

async function compressImage(file){

    return new Promise((resolve)=>{

        const img = new Image();

        img.onload = ()=>{

            const canvas = document.createElement('canvas');

            const MAX_WIDTH = 1200;

            let width = img.width;
            let height = img.height;

            if(width > MAX_WIDTH){

                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext('2d');

            ctx.drawImage(img,0,0,width,height);

            canvas.toBlob((blob)=>{
                resolve(blob);
            },'image/jpeg',0.8);

        };

        img.src = URL.createObjectURL(file);

    });

}

function parseOrder(text){

    const cleanText = text.replace(/\n/g,' ');

    console.log(cleanText);

    let phone = '';
    let total = '';
    let delivery = '';

    // =========================
    // Detect order type
    // =========================

    const isPhoneOrder =
        cleanText.includes('AMOUNT');

    const isOnlineOrder =
        cleanText.includes('Order Total');

    // =========================
    // PHONE NUMBER
    // =========================

    // Format:
    // Tel#2368875765

    let phoneMatch =
        cleanText.match(/Tel#?\s*(\d{10})/i);

    if(phoneMatch){

        phone = formatPhone(phoneMatch[1]);

    }else{

        // Alternative format
        let altPhone =
            cleanText.match(/(\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4})/);

        if(altPhone){

            phone = altPhone[1];
        }
    }

    // =========================
    // PHONE ORDER
    // =========================

    if(isPhoneOrder){

        // AMOUNT 133.06

        let totalMatch =
            cleanText.match(/AMOUNT\s*\$?\s*(\d+\.\d{2})/i);

        if(totalMatch){

            total = totalMatch[1];
        }

        // Delivery ... 12.75

        let deliveryMatch =
            cleanText.match(/Delivery.*?(\d+\.\d{2})/i);

        if(deliveryMatch){

            delivery = deliveryMatch[1];
        }

    }

    // =========================
    // ONLINE ORDER
    // =========================

    if(isOnlineOrder){

        // Order Total 24.76

        let totalMatch =
            cleanText.match(/Order Total\s*\$?\s*(\d+\.\d{2})/i);

        if(totalMatch){

            total = totalMatch[1];
        }

        // Delivery Fee 4.00

        let deliveryMatch =
            cleanText.match(/Delivery Fee.*?(\d+\.\d{2})/i);

        if(deliveryMatch){

            delivery = deliveryMatch[1];
        }

    }

    document.getElementById('phone').value = phone;
    document.getElementById('total').value = total;
    document.getElementById('delivery').value = delivery;

}

function formatPhone(num){

    return `(${num.slice(0,3)}) ${num.slice(3,6)}-${num.slice(6)}`;

}

function generateMessage(){

    const total =
        document.getElementById('total').value;

    const delivery =
        document.getElementById('delivery').value;

    const minutes =
        document.getElementById('minutes').value;

    const msg =
`Hi, this is Stone, your delivery driver from Dragon Fort.

Your order has just left the restaurant and should arrive in about ${minutes} minutes.

Total: $${total} (including delivery fee $${delivery}).

If you have any questions about your order, please contact the restaurant at 604-852-6891.

Thank you, and see you soon!`;

    document.getElementById('message').value = msg;

}

function sendSMS(){

    const phone =
        document.getElementById('phone').value
            .replace(/\D/g,'');

    const message =
        document.getElementById('message').value;

    if(!phone){

        alert('Phone number missing.');
        return;
    }

    if(!message){

        alert('Please generate the message first.');
        return;
    }

    const smsURL =
        `sms:${phone}&body=${encodeURIComponent(message)}`;

    window.location.href = smsURL;

}

</script>

</body>
</html>
