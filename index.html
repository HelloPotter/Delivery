<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stone SMS">
<link rel="apple-touch-icon" href="icon.png">

<title>Stone Delivery SMS v2.0</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:760px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:18px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

.brand{
    margin-bottom:25px;
    line-height:0.9;
}

.brand-light{
    font-size:52px;
    font-weight:200;
    letter-spacing:-2px;
}

.brand-bold{
    font-size:58px;
    font-weight:800;
    letter-spacing:-2px;
    display:flex;
    align-items:flex-end;
    gap:10px;
}

.version{
    font-size:14px;
    color:#999;
    font-weight:400;
    margin-bottom:8px;
    letter-spacing:0px;
}

.button-row{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.button-row button{
    flex:1;
}

button{
    border:none;
    border-radius:6px;
    background:black;
    color:white;
    padding:14px;
    font-size:16px;
    cursor:pointer;
}

label{
    display:block;
    margin-top:16px;
    margin-bottom:6px;
    font-weight:bold;
}

input,textarea{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:20px;
    font-weight:bold;
}

textarea{
    min-height:220px;
}

.preview{
    width:100%;
    margin-top:15px;
    border-radius:12px;
}

.hidden{
    display:none;
}

.status{
    margin-top:10px;
    color:#666;
}

.red{
    color:red;
}

</style>
</head>

<body>

<div class="container">

<div class="brand">

<div class="brand-light">
Stone
</div>

<div class="brand-light">
Delivery
</div>

<div class="brand-bold">
SMS
<span class="version">
Version 2.0
</span>
</div>

</div>

<label>Order Photo</label>

<div class="button-row">

<button onclick="document.getElementById('cameraInput').click()">
SCAN
</button>

<button onclick="openPhotoLibrary()">
UPLOAD
</button>

<button onclick="resetForm()">
RESET
</button>

</div>

<input
type="file"
id="cameraInput"
accept="image/*"
capture="environment"
class="hidden"
>

<input
type="file"
id="uploadInput"
accept="image/*"
class="hidden"
>

<img
id="preview"
class="preview"
style="display:none;"
src=""
>

<div class="status" id="status"></div>

<label>Phone Number</label>
<input type="text" id="phone">

<label>Address</label>
<input type="text" id="address">

<div class="button-row">

<button id="copyBtn" onclick="copyAddress()">
Copy Address
</button>

<button onclick="navigateAddress()">
Navigate
</button>

</div>

<label>Order Total</label>
<input type="text" id="total">

<label>Delivery Fee</label>
<input type="text" id="delivery">

<label>
Estimated Arrival Time (minutes)
</label>

<div style="display:flex;gap:10px;">
<input type="text" id="minutes" style="flex:1;">
<button type="button" onclick="increaseMinute()" style="width:120px;flex:none;">
+ 1 min
</button>
</div>

<button
style="width:100%;margin-top:20px;"
onclick="generateMessage()"
>
Generate Message
</button>

<label>Generated Message</label>

<div
id="message"
contenteditable="true"
style="
min-height:220px;
border:1px solid #ccc;
border-radius:6px;
padding:14px;
font-size:20px;
font-weight:bold;
line-height:1.5;
white-space:pre-wrap;
">
</div>

<button
style="width:100%;margin-top:15px;"
onclick="sendSMS()"
>
Send via Messages
</button>

</div>

<script>

const preview =
document.getElementById('preview');

const statusText =
document.getElementById('status');

function openPhotoLibrary(){

    document.getElementById('uploadInput').click();
}

[
 document.getElementById('cameraInput'),
 document.getElementById('uploadInput')
].forEach(input=>{

    input.addEventListener(
    'change',
    async function(e){

        const file=e.target.files[0];

        if(!file)return;

        preview.src=
        URL.createObjectURL(file);

        preview.style.display='block';

        statusText.innerText=
        'Running OCR...';

        try{

            const result=
            await Tesseract.recognize(
                file,
                'eng'
            );

            parseOrder(result.data.text);

            statusText.innerText=
            'OCR completed.';

        }catch(err){

            console.error(err);

            statusText.innerText=
            'OCR failed.';
        }

    });

});

function estimateMinutes(km){

    if(!km || km<=3){
        return 5;
    }

    return 5+Math.ceil((km-3)/2);
}

function cleanAddress(address){

    return address
    .replace(/buzz.*$/i,'')
    .replace(/buzzer.*$/i,'')
    .replace(/call.*$/i,'')
    .replace(/entrance.*$/i,'')
    .replace(/suite.*$/i,'')
    .trim();
}

function parseOrder(text){

    const cleanText=
    text.replace(/\n/g,' ');

    let phone='';
    let address='';
    let total='';
    let delivery='';
    let km=0;

    const isPhoneOrder=
    cleanText.includes('AMOUNT');

    const isOnlineOrder=
    cleanText.includes('Order Total');

    let onlinePhone=
    cleanText.match(
        /Tel\s*\(?(\d{3})\)?[-.\s]?(\d{3})[-.\s]?(\d{4})/i
    );

    if(onlinePhone){

        phone=
        `(${onlinePhone[1]}) ${onlinePhone[2]}-${onlinePhone[3]}`;

    }else{

        let phoneMatch=
        cleanText.match(
            /Tel#?\s*(\d{10})/i
        );

        if(phoneMatch){

            phone=
            formatPhone(phoneMatch[1]);
        }
    }

    if(isPhoneOrder){

        let totalMatch=
        cleanText.match(
            /AMOUNT\s+(\d+\.\d{2})/i
        );

        if(totalMatch){
            total=totalMatch[1];
        }

        let deliveryMatch=
        cleanText.match(
            /Delivery.*?\[\s*\d+\s*km\s*\]\s+(\d+\.\d{2})/i
        );

        if(deliveryMatch){
            delivery=deliveryMatch[1];
        }

        let kmMatch=
        cleanText.match(
            /\[(\d+)\s*km\]/i
        );

        if(kmMatch){
            km=parseFloat(kmMatch[1]);
        }

        let addressMatch=
        cleanText.match(
            /Tel#?\d{10}\s*(.*?)\s*Dragon Fort Restaurant/i
        );

        if(addressMatch){

            address=
            cleanAddress(addressMatch[1]);

            if(!address.includes('BC')){

                address+=', Abbotsford, BC';
            }
        }
    }

    if(isOnlineOrder){

        let totalMatch=
        cleanText.match(
            /Order Total\s*\$?(\d+\.\d{2})/i
        );

        if(totalMatch){
            total=totalMatch[1];
        }

        let deliveryMatch=
        cleanText.match(
            /Delivery Fee\s*\([\d.]+km\)\s+\$?(\d+\.\d{2})/i
        );

        if(deliveryMatch){
            delivery=deliveryMatch[1];
        }

        let kmMatch=
        cleanText.match(
            /Delivery Fee\s*\(([\d.]+)km\)/i
        );

        if(kmMatch){
            km=parseFloat(kmMatch[1]);
        }

        let addressMatch=
        cleanText.match(
            /Addr\.\s*(.*?)\s*[A-Z]\d[A-Z]\d[A-Z]\d/i
        );

        if(addressMatch){
            address=addressMatch[1].trim();
        }
    }

    document.getElementById('phone').value=phone;
    document.getElementById('address').value=address;
    document.getElementById('total').value=total;
    document.getElementById('delivery').value=delivery;
    document.getElementById('minutes').value=estimateMinutes(km);
}

function formatPhone(num){

    return `(${num.slice(0,3)}) ${num.slice(3,6)}-${num.slice(6)}`;
}


function increaseMinute(){

    const input=
    document.getElementById('minutes');

    let value=
    parseInt(input.value)||0;

    value++;

    input.value=value;
}

function generateMessage(){

    const total=
    document.getElementById('total').value;

    const delivery=
    document.getElementById('delivery').value;

    const minutes=
    document.getElementById('minutes').value;

    const msg=
`Hi, this is Stone, your delivery driver from Dragon Fort.

Your order has just left the restaurant and should arrive in about <span style="color:red;">${minutes}</span> minutes.

Total: $<span style="color:red;">${total}</span> (including delivery fee $<span style="color:red;">${delivery}</span>).

If you have any questions about your order, please contact the restaurant at 604-852-6891.

Thank you, and see you soon!`;

    document.getElementById('message').innerHTML=msg;
}

function copyAddress(){

    const address=
    document.getElementById('address').value;

    navigator.clipboard.writeText(address);

    const btn=
    document.getElementById('copyBtn');

    btn.innerText='Copied';

    setTimeout(()=>{
        btn.innerText='Copy Address';
    },2000);
}

function navigateAddress(){

    const address=
    document.getElementById('address').value;

    window.open(
    `http://maps.apple.com/?daddr=${encodeURIComponent(address)}`,
    '_blank'
    );
}

function resetForm(){

    ['phone','address','total','delivery','message']
    .forEach(id=>{

        document.getElementById(id).value='';
    });

    document.getElementById('minutes').value='';

    document.getElementById('message').innerHTML='';

    document.getElementById('copyBtn').innerText=
    'Copy Address';

    preview.style.display='none';

    statusText.innerText='';
}

function sendSMS(){

    const phone=
    document.getElementById('phone')
    .value
    .replace(/\D/g,'');

    const message=
    document.getElementById('message').innerText;

    if(!phone || !message)return;

    window.location.href=
    `sms:${phone}&body=${encodeURIComponent(message)}`;
}

</script>

</body>
</html>
